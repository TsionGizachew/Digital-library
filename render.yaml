services:
  - type: web
    name: yeka-library-backend
    env: node
    plan: free
    buildCommand: "./render-build.sh"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: API_VERSION
        value: v1
      - key: MONGODB_URI
        sync: false  # Set this manually in Render dashboard
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false  # Set to your ET hosting domain e.g. https://yourdomain.com
      - key: SOCKET_CORS_ORIGIN
        sync: false  # Same as CORS_ORIGIN
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: LOG_LEVEL
        value: info
      - key: LOG_FILE
        value: logs/app.log
      - key: ADMIN_EMAIL
        value: admin@yekalibrary.gov.et
      - key: ADMIN_PASSWORD
        sync: false  # Set this manually in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MONGODB_TEST_URI
        value: mongodb://localhost:27017/digital-library-test
