services:
  - type: web
    name: backend
    env: node
    plan: free
    buildCommand: "./render-build.sh"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_VERSION
        value: v1
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: ${frontend.url}
      - key: SOCKET_CORS_ORIGIN
        value: ${frontend.url}
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: LOG_LEVEL
        value: info
      - key: ADMIN_EMAIL
        value: admin@yekalibrary.gov.et
      - key: ADMIN_PASSWORD
        sync: false
  - type: web
    name: frontend
    env: static
    plan: free
    rootDir: frontend
    staticPublishPath: ./build
    buildCommand: "npm install && npm run build"
    envVars:
      - key: REACT_APP_API_URL
        value: ${backend.url}/api/v1
      - key: REACT_APP_NAME
        value: Yeka Sub City Library
      - key: REACT_APP_VERSION
        value: 1.0.0
      - key: REACT_APP_ENABLE_SOCKET
        value: true
      - key: REACT_APP_ENABLE_NOTIFICATIONS
        value: true
      - key: GENERATE_SOURCEMAP
        value: false
